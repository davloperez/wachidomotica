# @esphome-device
# Cocina Configuration

esphome:
  name: esp-cocina

packages:
  common: !include common.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Cocina"

switch:
  - platform: gpio
    pin: GPIO19
    id: relay_light_techo_barra_cocina
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Techo Barra Cocina"
  - platform: gpio
    pin: GPIO21
    id: relay_light_isla_cocina
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Isla Cocina"
  - platform: gpio
    pin: GPIO22
    id: relay_light_techo_cocina
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Techo Cocina"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      mode:
        input: true
        pulldown: true
    id: boton_1_jung_cocina
    name: "Botón 1 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
  - platform: gpio
    pin:
      number: GPIO32
      mode:
        input: true
        pulldown: true
    id: boton_2_jung_cocina
    name: "Botón 2 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
  - platform: gpio
    pin:
      number: GPIO27
      mode:
        input: true
        pulldown: true
    id: boton_3_jung_cocina
    name: "Botón 3 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
  - platform: gpio
    pin:
      number: GPIO26
      mode:
        input: true
        pulldown: true
    id: boton_4_jung_cocina
    name: "Botón 4 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_click:
      then:
        - switch.toggle: relay_light_isla_cocina
  - platform: gpio
    pin:
      number: GPIO25
      mode:
        input: true
        pulldown: true
    id: boton_5_jung_cocina
    name: "Botón 5 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_click:
      then:
        - switch.toggle: relay_light_techo_cocina
  - platform: gpio
    pin:
      number: GPIO15
      mode:
        input: true
        pulldown: true
    id: boton_6_jung_cocina
    name: "Botón 6 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      then:
        - switch.turn_on: relay_light_techo_barra_cocina
    on_release:
      then:
        - switch.turn_off: relay_light_techo_barra_cocina
  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pulldown: true
    id: boton_7_jung_cocina
    name: "Botón 7 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
  - platform: gpio
    pin:
      number: GPIO13
      mode:
        input: true
        pulldown: true
    id: boton_8_jung_cocina
    name: "Botón 8 Jung Cocina"
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
