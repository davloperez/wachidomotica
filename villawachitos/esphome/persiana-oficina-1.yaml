# Persiana Oficina 1 Configuration
# Imports shared logic from persiana-base.yaml

esphome:
  name: persiana-oficina-1
  on_boot:
    then:
      - output.turn_on: led_up
      - output.turn_on: led_down
      - output.turn_on: led_light

packages:
  base: !include persiana-base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Oficina-1"

  manual_ip:
    static_ip: 192.168.2.100
    gateway: 192.168.2.1
    subnet: 255.255.255.0
    dns1: 192.168.2.1
    dns2: 8.8.8.8

# ====== LEDs INDICADORES ======
output:
  - platform: gpio
    pin: GPIO4
    id: led_up

  - platform: gpio
    pin: GPIO5
    id: led_down

  - platform: gpio
    pin: GPIO13
    id: led_light

# ====== LUZ TECHO ======
switch:
  - platform: gpio
    pin: GPIO18
    id: relay_light
    restore_mode: ALWAYS_OFF
    name: "Relé Luz Techo"
    on_turn_on:
      - output.turn_off: led_light
    on_turn_off:
      - output.turn_on: led_light

  # Extender relés del base para vincular LEDs
  - id: relay_up
    on_turn_on:
      - output.turn_off: led_up
    on_turn_off:
      - output.turn_on: led_up

  - id: relay_down
    on_turn_on:
      - output.turn_off: led_down
    on_turn_off:
      - output.turn_on: led_down

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO25
      mode: INPUT_PULLDOWN
    id: button_light
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_light
