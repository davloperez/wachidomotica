# Persiana Oficina 1 Configuration
# Imports shared logic from persiana-base.yaml

esphome:
  name: persiana-oficina-1

packages:
  base: !include persiana-base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Oficina-1"

  manual_ip:
    static_ip: 192.168.2.100
    gateway: 192.168.2.1
    subnet: 255.255.255.0
    dns1: 192.168.2.1
    dns2: 8.8.8.8

# ====== LUZ TECHO ======
switch:
  - platform: gpio
    pin: GPIO18
    id: relay_light
    restore_mode: ALWAYS_OFF
    name: "Relé Luz Techo"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO25
      mode: INPUT_PULLDOWN
    id: button_light
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_light
