# Shared base configuration for oficina persiana controllers
# Adds LED indicators and ceiling light on top of persiana-base.yaml
# Note: persiana-base.yaml must also be included in the device file

esphome:
  on_boot:
    then:
      - light.turn_on: light_led_up
      - light.turn_on: light_led_down
      - light.turn_on: light_led_light

# ====== LEDs INDICADORES ======
output:
  - platform: gpio
    pin: GPIO4
    id: led_up

  - platform: gpio
    pin: GPIO5
    id: led_down

  - platform: gpio
    pin: GPIO13
    id: led_light

light:
  - platform: binary
    name: "Led Botón Subir"
    id: light_led_up
    internal: true
    output: led_up

  - platform: binary
    name: "Led Botón Bajar"
    id: light_led_down
    internal: true
    output: led_down

  - platform: binary
    name: "Led Luz Techo"
    id: light_led_light
    internal: true
    output: led_light

# ====== LUZ TECHO ======
switch:
  - platform: gpio
    pin: GPIO18
    id: relay_light
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Techo"
    on_turn_on:
      - light.turn_off: light_led_light
    on_turn_off:
      - light.turn_on: light_led_light

# ====== EXTENDER COVER PARA VINCULAR LEDs ======
cover:
  - id: !extend persiana_cover
    on_opening:
      - script.execute: blink_led_up
    on_closing:
      - script.execute: blink_led_down
    on_opened:
      - script.stop: blink_led_up
      - light.turn_on: light_led_up
    on_closed:
      - script.stop: blink_led_down
      - light.turn_on: light_led_down
    on_idle:
      - script.stop: blink_led_up
      - script.stop: blink_led_down
      - light.turn_on: light_led_up
      - light.turn_on: light_led_down
      - lambda: |-
          ESP_LOGI("persiana", "idle pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);
          id(persiana_position_storage) = id(persiana_cover).position;
          ESP_LOGI("persiana", "store idle pos=%.2f", id(persiana_position_storage));

script:
  - id: blink_led_up
    mode: restart
    then:
      - while:
          condition:
            lambda: "return id(relay_up).state;"
          then:
            - light.turn_on: light_led_up
            - delay: 350ms
            - light.turn_off: light_led_up
            - delay: 350ms
      - light.turn_on: light_led_up

  - id: blink_led_down
    mode: restart
    then:
      - while:
          condition:
            lambda: "return id(relay_down).state;"
          then:
            - light.turn_on: light_led_down
            - delay: 350ms
            - light.turn_off: light_led_down
            - delay: 350ms
      - light.turn_on: light_led_down

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO25
      mode: INPUT_PULLDOWN
    id: button_light
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_light

# Estos scripts se definen en persiana-base.yaml (toggle_button_up, toggle_button_down)
# Se heredan aquí mediante el paquete base
