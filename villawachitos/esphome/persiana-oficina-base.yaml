# Resumen de pines usados en este archivo:
# - SN74HC595: DATA=GPIO4, CLOCK=GPIO22, LATCH=GPIO23
# - Relés persiana (en persiana-base.yaml): relay_up=GPIO16, relay_down=GPIO17
# - Relé luz techo: GPIO18
# - Botones físicos (1..8): GPIO34, GPIO32, GPIO25, GPIO27, GPIO35, GPIO33, GPIO26, GPIO14
# - Botón luz techo (físico): Button 2 -> GPIO32 (inverso en led_2)
#
# Nota: este listado refleja los pines usados por `persiana-oficina-base.yaml`.
# Otros paquetes/device files (p. ej. `controller.yaml`) pueden usar pines
# adicionales (por ejemplo I2C/OLED suele usar GPIO21/GPIO22). Verifiqua antes
# de reasignar pines para evitar conflictos.
#
# Pines no usados en este archivo: todos los demás GPIOs del SoC (ej.: GPIO0, GPIO1,
# GPIO2, GPIO12, GPIO13, GPIO36, etc.) pero la disponibilidad real depende de
# otras configuraciones en el proyecto y de la placa concreta.
#
# Mantener este archivo actualizado si cambias asignaciones de pines.
#
# Shared base configuration for oficina persiana controllers
# Adds: 8 status LEDs (SN74HC595) and ceiling light
# Note: persiana-base.yaml must also be included in the device file

# ====== 8 STATUS LEDS (via SN74HC595) ======
switch:
  # ====== CEILING LIGHT (existing relay) ======
  - platform: gpio
    pin: GPIO18
    id: relay_light
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Techo"

# ====== EXTENDER COVER CON LÓGICA DE PERSIANAS ======
cover:
  - id: !extend persiana_cover
    on_idle:
      - lambda: |-
          ESP_LOGI("persiana", "idle pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);
          id(persiana_position_storage) = id(persiana_cover).position;
          ESP_LOGI("persiana", "store idle pos=%.2f", id(persiana_position_storage));

# No blink scripts: LEDs reflect physical button state (on while pressed)

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      mode:
        input: true
        pulldown: true
    id: button_1
    name: "Button 1"
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: toggle_button_up
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 50ms
        then:
          - script.execute: set_button_up_60

  - platform: gpio
    pin:
      number: GPIO26
      mode:
        input: true
        pulldown: true
    id: button_2
    name: "Button 2"
    on_press:
      - switch.toggle: relay_light

  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pulldown: true
    id: button_3
    name: "Button 3"
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: toggle_button_down
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 50ms
        then:
          - script.execute: set_button_down_30

  - platform: gpio
    pin:
      number: GPIO13
      mode:
        input: true
        pulldown: true
    id: button_4
    name: "Button 4"

