# Shared base configuration for persiana (blind) controllers
# This file contains all common logic and components

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

web_server:
  port: 8080
  js_include: "./v2/www.js"
  js_url: ""
  version: 2

ota:
  - platform: esphome
    password: ""

# ====== RELÉS ======
switch:
  - platform: gpio
    pin: GPIO16
    id: relay_up
    interlock: [relay_down]
    restore_mode: ALWAYS_OFF
    name: "Relé Subir"

  - platform: gpio
    pin: GPIO17
    id: relay_down
    interlock: [relay_up]
    restore_mode: ALWAYS_OFF
    name: "Relé Bajar"

# ====== BOTONES ======
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLDOWN
    id: button_up
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_up

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLDOWN
    id: button_down
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_down
