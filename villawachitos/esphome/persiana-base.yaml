# Persiana (blind) controller: relays and physical buttons

packages:
  common: !include common.yaml

# ====== ESP-NOW (receptor via raw ESP-IDF API) ======
# device_id debe definirse como substitution en cada persiana YAML:
#   substitutions:
#     device_id: "N"   (ver orden en controller.yaml)

globals:
  - id: espnow_pending
    type: int
    restore_value: no
    initial_value: "0"

esphome:
  includes:
    - espnow_recv.h
  on_boot:
    priority: -200 # muy tarde, después de que WiFi esté listo
    then:
      - lambda: |-
          if (esp_now_init() != ESP_OK) {
            ESP_LOGE("espnow", "esp_now_init() failed");
            return;
          }
          esp_now_register_recv_cb(espnow_recv_cb);
          ESP_LOGI("espnow", "Receiver ready (device_id=${device_id})");

interval:
  - interval: 100ms
    then:
      - lambda: |-
          int pkt = id(espnow_pending);
          if (pkt == 0) return;
          id(espnow_pending) = 0;
          int target = (pkt >> 8) & 0xFF;
          int action = pkt & 0xFF;
          if (target != ${device_id}) return;
          if (action == 'U') id(relay_up).toggle();
          else if (action == 'D') id(relay_down).toggle();

# ====== RELÉS ======
switch:
  - platform: gpio
    pin: GPIO16
    id: relay_up
    interlock: [relay_down]
    restore_mode: ALWAYS_OFF
    name: "Relé Subir"

  - platform: gpio
    pin: GPIO17
    id: relay_down
    interlock: [relay_up]
    restore_mode: ALWAYS_OFF
    name: "Relé Bajar"

# ====== BOTONES ======
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLDOWN
    id: button_up
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_up

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLDOWN
    id: button_down
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_down
