# Shared base configuration for persiana (blind) controllers
# This file contains all common logic and components

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

web_server:
  port: 80

ota:
  - platform: esphome
    password: ""

captive_portal:

# ====== RELÉS ======
switch:
  - platform: gpio
    pin: GPIO16
    id: relay_up
    interlock: [relay_down]
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin: GPIO17
    id: relay_down
    interlock: [relay_up]
    restore_mode: ALWAYS_OFF

# ====== BOTONES ======
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLDOWN
    id: button_up
    name: "Subir"
    filters:
      - delayed_on: 50ms
    on_press:
      - logger.log: "Botón Subir presionado"
      - switch.turn_on: relay_up
    on_release:
      - logger.log: "Botón Subir soltado"
      - switch.turn_off: relay_up

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLDOWN
    id: button_down
    name: "Bajar"
    filters:
      - delayed_on: 50ms
    on_press:
      - logger.log: "Botón Bajar presionado"
      - switch.turn_on: relay_down
    on_release:
      - logger.log: "Botón Bajar soltado"
      - switch.turn_off: relay_down
