# Persiana (blind) controller: relays and physical buttons

packages:
  common: !include common.yaml

# ====== RELÉS ======
switch:
  - platform: gpio
    pin: GPIO16
    id: relay_up
    interlock: [relay_down]
    restore_mode: ALWAYS_OFF
    name: "Relé Subir"

  - platform: gpio
    pin: GPIO17
    id: relay_down
    interlock: [relay_up]
    restore_mode: ALWAYS_OFF
    name: "Relé Bajar"

# ====== BOTONES ======
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO32
      mode: INPUT_PULLDOWN
    id: button_up
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_up

  - platform: gpio
    pin:
      number: GPIO33
      mode: INPUT_PULLDOWN
    id: button_down
    filters:
      - delayed_on: 50ms
    on_press:
      - switch.toggle: relay_down
