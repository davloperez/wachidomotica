# Persiana (blind) controller: time-based cover with relays and physical buttons

packages:
  common: !include common.yaml

# ====== SUSTITUCIONES CONFIGURABLES ======
substitutions:
  # Tiempos de viaje en segundos (pueden ser sobrescritos en cada dispositivo)
  open_duration: "29" # Tiempo para subir la persiana (segundos)
  close_duration: "28" # Tiempo para bajar la persiana (segundos)

# ====== ESP-NOW (receptor via raw ESP-IDF API) ======
# device_id debe definirse como substitution en cada persiana YAML:
#   substitutions:
#     device_id: "N"   (ver orden en controller.yaml)

globals:
  - id: espnow_pending
    type: int
    restore_value: no
    initial_value: "0"
  - id: persiana_position_storage
    type: float
    restore_value: yes
    initial_value: "0"
  # Contadores y estados para detección de multi-press / long-press
  - id: up_press_count
    type: int
    restore_value: no
    initial_value: "0"
  - id: up_pressed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: up_consumed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: down_press_count
    type: int
    restore_value: no
    initial_value: "0"
  - id: down_pressed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: down_consumed
    type: bool
    restore_value: no
    initial_value: "false"

esphome:
  includes:
    - espnow_recv.h
  on_boot:
    priority: -200 # muy tarde, después de que WiFi esté listo
    then:
      - lambda: |-
          if (esp_now_init() != ESP_OK) {
            ESP_LOGE("espnow", "esp_now_init() failed");
            return;
          }
          esp_now_register_recv_cb(espnow_recv_cb);
          ESP_LOGI("espnow", "Receiver ready (device_id=${device_id})");
          ESP_LOGI("persiana", "boot restored stored_pos=%.2f cover_pos=%.2f op=%d",
            id(persiana_position_storage), id(persiana_cover).position,
            id(persiana_cover).current_operation);
      - delay: 5s
      - lambda: |-
          ESP_LOGI("persiana", "restore from stored_pos=%.2f", id(persiana_position_storage));
          auto call = id(persiana_cover).make_call();
          call.set_position(id(persiana_position_storage));
          call.perform();
          ESP_LOGI("persiana", "restored cover_pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);

interval:
  - interval: 100ms
    then:
      - lambda: |-
          int pkt = id(espnow_pending);
          if (pkt == 0) return;
          id(espnow_pending) = 0;
          int target = (pkt >> 8) & 0xFF;
          int action = pkt & 0xFF;
          if (target != ${device_id}) return;
          auto call = id(persiana_cover).make_call();
          if (action == 'U') {
            call.set_command_open();
          }
          else if (action == 'D') {
            call.set_command_close();
          }
          call.perform();

  # Guardar posición de la persiana cada 5 segundos
  - interval: 5s
    then:
      - lambda: |-
          if (id(persiana_cover).current_operation == esphome::cover::COVER_OPERATION_IDLE && id(persiana_cover).position != id(persiana_position_storage)) {
            id(persiana_position_storage) = id(persiana_cover).position;
            ESP_LOGI("persiana", "store pos=%.2f op=%d",
              id(persiana_cover).position, id(persiana_cover).current_operation);
          }

# ====== RELÉS (internos, controlados por el cover) ======
switch:
  - platform: gpio
    pin: GPIO16
    id: relay_up
    interlock: [relay_down]
    restore_mode: ALWAYS_OFF
    internal: true

  - platform: gpio
    pin: GPIO17
    id: relay_down
    interlock: [relay_up]
    restore_mode: ALWAYS_OFF
    internal: true

# ====== COVER TIME-BASED ======
cover:
  - platform: time_based
    name: "Persiana"
    id: persiana_cover
    assumed_state: true
    open_action:
      - switch.turn_on: relay_up
    close_action:
      - switch.turn_on: relay_down
    stop_action:
      - switch.turn_off: relay_up
      - switch.turn_off: relay_down
    open_duration: ${open_duration}s
    close_duration: ${close_duration}s
    on_opened:
      - lambda: |-
          ESP_LOGI("persiana", "opened pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);
          id(persiana_position_storage) = id(persiana_cover).position;
          ESP_LOGI("persiana", "store opened pos=%.2f", id(persiana_position_storage));
    on_closed:
      - lambda: |-
          ESP_LOGI("persiana", "closed pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);
          id(persiana_position_storage) = id(persiana_cover).position;
          ESP_LOGI("persiana", "store closed pos=%.2f", id(persiana_position_storage));
    on_idle:
      - lambda: |-
          ESP_LOGI("persiana", "idle pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);
          id(persiana_position_storage) = id(persiana_cover).position;
          ESP_LOGI("persiana", "store idle pos=%.2f", id(persiana_position_storage));

# NOTE: physical button definitions for up/down are expected to be provided
# by the device-specific package (e.g., persiana-oficina-base.yaml) so that
# different devices can map their physical pins as needed.

script:
  # Compatibilidad: script antiguo redirige al nuevo manejador de press
  - id: toggle_button_up
    then:
      - script.execute: button_up_press

  - id: toggle_button_down
    then:
      - script.execute: button_down_press

  # Pulsación corta / multi-press / long-press para botón "Up"
  - id: button_up_press
    then:
      - lambda: |-
          id(up_press_count)++;
          id(up_pressed) = true;
          id(up_consumed) = false;
          ESP_LOGD("persiana", "button_up_press count=%d", id(up_press_count));
      # Evaluación de long-press (1s)
      - delay: 1s
      - lambda: |-
          if (id(up_pressed) && !id(up_consumed)) {
            ESP_LOGI("persiana", "button_up long-press detected -> set 20%%");
            auto call = id(persiana_cover).make_call();
            call.set_position(20);
            call.perform();
            id(up_consumed) = true;
            id(up_press_count) = 0;
          }
      # Evaluación de multi/click tras ventana corta (400ms)
      - delay: 400ms
      - lambda: |-
          if (id(up_consumed)) return;
          int cnt = id(up_press_count);
          if (cnt == 0) return;
          if (cnt == 1) {
            // Comportamiento simple: si está en movimiento, pausa; si está idle, abre
            if (id(persiana_cover).current_operation != esphome::cover::COVER_OPERATION_IDLE) {
              ESP_LOGI("persiana", "button_up single press -> stop");
              {
                auto call = id(persiana_cover).make_call();
                call.set_command_stop();
                call.perform();
              }
            } else {
              ESP_LOGI("persiana", "button_up single press -> open");
              {
                auto call = id(persiana_cover).make_call();
                call.set_command_open();
                call.perform();
              }
            }
          }
          else if (cnt == 2) {
            ESP_LOGI("persiana", "button_up double press -> set 50%%");
            auto call = id(persiana_cover).make_call();
            call.set_position(50);
            call.perform();
          }
          else if (cnt >= 3) {
            ESP_LOGI("persiana", "button_up triple+ press -> set 30%%");
            auto call = id(persiana_cover).make_call();
            call.set_position(30);
            call.perform();
          }
          id(up_press_count) = 0;

  - id: button_up_release
    then:
      - lambda: |-
          id(up_pressed) = false;
          ESP_LOGD("persiana", "button_up released");

  # Pulsación corta / multi-press / long-press para botón "Down"
  - id: button_down_press
    then:
      - lambda: |-
          id(down_press_count)++;
          id(down_pressed) = true;
          id(down_consumed) = false;
          ESP_LOGD("persiana", "button_down_press count=%d", id(down_press_count));
      # Evaluación de long-press (1s)
      - delay: 1s
      - lambda: |-
          if (id(down_pressed) && !id(down_consumed)) {
            ESP_LOGI("persiana", "button_down long-press detected -> set 20%%");
            auto call = id(persiana_cover).make_call();
            call.set_position(20);
            call.perform();
            id(down_consumed) = true;
            id(down_press_count) = 0;
          }
      # Evaluación de multi/click tras ventana corta (400ms)
      - delay: 400ms
      - lambda: |-
          if (id(down_consumed)) return;
          int cnt = id(down_press_count);
          if (cnt == 0) return;
          if (cnt == 1) {
            if (id(persiana_cover).current_operation != esphome::cover::COVER_OPERATION_IDLE) {
              ESP_LOGI("persiana", "button_down single press -> stop");
              {
                auto call = id(persiana_cover).make_call();
                call.set_command_stop();
                call.perform();
              }
            } else {
              ESP_LOGI("persiana", "button_down single press -> close");
              {
                auto call = id(persiana_cover).make_call();
                call.set_command_close();
                call.perform();
              }
            }
          }
          else if (cnt == 2) {
            ESP_LOGI("persiana", "button_down double press -> set 50%%");
            auto call = id(persiana_cover).make_call();
            call.set_position(50);
            call.perform();
          }
          else if (cnt >= 3) {
            ESP_LOGI("persiana", "button_down triple+ press -> set 30%%");
            auto call = id(persiana_cover).make_call();
            call.set_position(30);
            call.perform();
          }
          id(down_press_count) = 0;

  - id: button_down_release
    then:
      - lambda: |-
          id(down_pressed) = false;
          ESP_LOGD("persiana", "button_down released");
