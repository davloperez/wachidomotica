platform: gpio
id: btn_${n}
name: "Button ${n}"
pin:
  number: ${gpio}
  inverted: true
  mode:
    input: true
on_multi_click:
  # Single click: ignored in cleaning mode, otherwise toggle or stop blink
  - timing:
      - ON for 50ms to 350ms
      - OFF for at least 350ms
    then:
      - if:
          condition:
            lambda: return !id(cleaning_mode);
          then:
            - if:
                condition:
                  lambda: return id(led_blink_${n});
                then:
                  - globals.set:
                      id: led_blink_${n}
                      value: "false"
                  - script.stop: blink_led_${n}
                  - switch.turn_off: led_${n}
                else:
                  - switch.toggle: led_${n}
  # Double click: ignored in cleaning mode, otherwise start blink
  - timing:
      - ON for 50ms to 350ms
      - OFF for 50ms to 350ms
      - ON for 50ms to 350ms
      - OFF for at least 50ms
    then:
      - if:
          condition:
            lambda: return !id(cleaning_mode);
          then:
            - globals.set:
                id: led_blink_${n}
                value: "true"
            - script.execute: blink_led_${n}
  # Long hold (3 s): enter or exit cleaning mode if partner button is also held
  - timing:
      - ON for at least 3000ms
    then:
      - if:
          condition:
            lambda: return id(btn_${cleaning_partner}).state;
          then:
            - if:
                condition:
                  lambda: return id(cleaning_mode);
                then:
                  - globals.set:
                      id: cleaning_mode
                      value: "false"
                  - script.stop: cleaning_timeout_script
                else:
                  - script.execute: cleaning_mode_script
