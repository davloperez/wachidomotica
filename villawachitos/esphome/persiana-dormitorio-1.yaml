# @esphome-device
# Persiana Dormitorio 1 Configuration
# Imports shared logic from persiana-base.yaml

substitutions:
  device_id: "2"
  open_duration: "29" # Tiempo para subir (segundos)
  close_duration: "28" # Tiempo para bajar (segundos)

esphome:
  name: persiana-dormitorio-1

packages:
  ips: !include ips.yaml
  base: !include persiana-base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Dormitorio-1"

  manual_ip:
    static_ip: ${ip_persiana_dormitorio_1}
    gateway: 192.168.1.20
    subnet: 255.255.255.0
    dns1: 192.168.1.20
    dns2: 8.8.8.8
