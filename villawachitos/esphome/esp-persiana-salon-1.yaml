# @esphome-device
# Persiana Salon 1 Configuration
# Imports shared logic from persiana-base-old.yaml

substitutions:
  device_id: "5"
  open_duration: "23" # Tiempo para subir (segundos)
  close_duration: "22" # Tiempo para bajar (segundos)

esphome:
  name: persiana-salon-1

packages:
  base: !include persiana-base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Salon-1"

cover:
  - id: !extend persiana_cover
    on_idle:
      - lambda: |-
          ESP_LOGI("persiana", "idle pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);
          id(persiana_position_storage) = id(persiana_cover).position;
          ESP_LOGI("persiana", "store idle pos=%.2f", id(persiana_position_storage));

# No blink scripts: LEDs reflect physical button state (on while pressed)

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      mode:
        input: true
        pulldown: true
    id: boton_1_jung_abajo_salon
    name: "Boton 1 jung abajo salon"
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: toggle_button_up
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 50ms
        then:
          - script.execute: set_button_up_60

  - platform: gpio
    pin:
      number: GPIO26
      mode:
        input: true
        pulldown: true
    id: boton_3_jung_abajo_salon
    name: "Boton 3 jung abajo salon"
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: toggle_button_down
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 50ms
        then:
          - script.execute: set_button_down_30

  - platform: gpio
    pin:
      number: GPIO14
      mode:
        input: true
        pulldown: true
    id: boton_5_jung_abajo_salon
    name: "Boton 5 jung abajo salon"

  - platform: gpio
    pin:
      number: GPIO13
      mode:
        input: true
        pulldown: true
    id: boton_7_jung_abajo_salon
    name: "Boton 7 jung abajo salon"
