# Persiana Tester Configuration
# Imports shared logic from persiana-base.yaml

esphome:
  name: persiana-tester

packages:
  common: !include common.yaml

# ====== GLOBALS: blink state for all LED-buttons + cleaning mode flag ======
globals:
  - id: cleaning_mode
    type: bool
    initial_value: "false"
  - !include { file: led-blink-global.yaml, vars: { n: 1 } }
  - !include { file: led-blink-global.yaml, vars: { n: 2 } }
  - !include { file: led-blink-global.yaml, vars: { n: 3 } }
  - !include { file: led-blink-global.yaml, vars: { n: 4 } }
  - !include { file: led-blink-global.yaml, vars: { n: 5 } }
  - !include { file: led-blink-global.yaml, vars: { n: 6 } }
  - !include { file: led-blink-global.yaml, vars: { n: 7 } }
  - !include { file: led-blink-global.yaml, vars: { n: 8 } }

# ====== SN74HC595N (8 LEDs secuenciales) ======
# DS=GPIO4, SH_CP=GPIO22, ST_CP=GPIO23
sn74hc595:
  - id: sn74hc595_hub
    data_pin: GPIO4
    clock_pin: GPIO22
    latch_pin: GPIO23
    sr_count: 1

# ====== RGB LED ======
# R=GPIO21, G=GPIO19, B=GPIO5
# ====== BUZZER ======
# Buffer on GPIO13
output:
  - platform: ledc
    pin: GPIO21
    id: output_red
  - platform: ledc
    pin: GPIO19
    id: output_green
  - platform: ledc
    pin: GPIO5
    id: output_blue
  - platform: ledc
    pin: GPIO13
    id: buzzer

light:
  - platform: rgb
    name: "RGB LED"
    id: rgb_led
    red: output_red
    green: output_green
    blue: output_blue

switch:
  - !include { file: led-switch.yaml, vars: { n: 1, sr_number: 0 } }
  - !include { file: led-switch.yaml, vars: { n: 2, sr_number: 1 } }
  - !include { file: led-switch.yaml, vars: { n: 3, sr_number: 2 } }
  - !include { file: led-switch.yaml, vars: { n: 4, sr_number: 3 } }
  - !include { file: led-switch.yaml, vars: { n: 5, sr_number: 4 } }
  - !include { file: led-switch.yaml, vars: { n: 6, sr_number: 5 } }
  - !include { file: led-switch.yaml, vars: { n: 7, sr_number: 6 } }
  - !include { file: led-switch.yaml, vars: { n: 8, sr_number: 7 } }

script:
  # ====== BUZZER BEEP SCRIPTS ======
  - id: beep_single
    mode: restart
    then:
      - output.ledc.set_frequency:
          id: buzzer
          frequency: 2000Hz
      - output.set_level:
          id: buzzer
          level: 50%
      - delay: 80ms
      - output.turn_off: buzzer

  - id: beep_double
    mode: restart
    then:
      - output.ledc.set_frequency:
          id: buzzer
          frequency: 2000Hz
      - output.set_level:
          id: buzzer
          level: 50%
      - delay: 80ms
      - output.turn_off: buzzer
      - delay: 80ms
      - output.set_level:
          id: buzzer
          level: 50%
      - delay: 80ms
      - output.turn_off: buzzer

  - id: beep_long
    mode: restart
    then:
      - output.ledc.set_frequency:
          id: buzzer
          frequency: 2000Hz
      - output.set_level:
          id: buzzer
          level: 50%
      - delay: 1s
      - output.turn_off: buzzer

  # Blink scripts for all LED-buttons (0.5 s period)
  - !include { file: blink-script.yaml, vars: { n: 1 } }
  - !include { file: blink-script.yaml, vars: { n: 2 } }
  - !include { file: blink-script.yaml, vars: { n: 3 } }
  - !include { file: blink-script.yaml, vars: { n: 4 } }
  - !include { file: blink-script.yaml, vars: { n: 5 } }
  - !include { file: blink-script.yaml, vars: { n: 6 } }
  - !include { file: blink-script.yaml, vars: { n: 7 } }
  - !include { file: blink-script.yaml, vars: { n: 8 } }

  # ====== CLEANING MODE ======
  # Expires after 60 s; can be stopped early by setting cleaning_mode = false
  - id: cleaning_timeout_script
    mode: restart
    then:
      - delay: 60s
      - globals.set:
          id: cleaning_mode
          value: "false"

  # Entry point for cleaning mode: stops all blink activity, then fast-blinks
  # all LEDs together until cleaning_mode is cleared (timeout or manual exit)
  - id: cleaning_mode_script
    mode: restart
    then:
      - globals.set: { id: led_blink_1, value: "false" }
      - script.stop: blink_led_1
      - globals.set: { id: led_blink_2, value: "false" }
      - script.stop: blink_led_2
      - globals.set: { id: led_blink_3, value: "false" }
      - script.stop: blink_led_3
      - globals.set: { id: led_blink_4, value: "false" }
      - script.stop: blink_led_4
      - globals.set: { id: led_blink_5, value: "false" }
      - script.stop: blink_led_5
      - globals.set: { id: led_blink_6, value: "false" }
      - script.stop: blink_led_6
      - globals.set: { id: led_blink_7, value: "false" }
      - script.stop: blink_led_7
      - globals.set: { id: led_blink_8, value: "false" }
      - script.stop: blink_led_8
      - globals.set:
          id: cleaning_mode
          value: "true"
      - script.execute: beep_long
      - script.execute: cleaning_timeout_script
      - while:
          condition:
            lambda: return id(cleaning_mode);
          then:
            - switch.turn_on: led_1
            - switch.turn_on: led_2
            - switch.turn_on: led_3
            - switch.turn_on: led_4
            - switch.turn_on: led_5
            - switch.turn_on: led_6
            - switch.turn_on: led_7
            - switch.turn_on: led_8
            - delay: 150ms
            - switch.turn_off: led_1
            - switch.turn_off: led_2
            - switch.turn_off: led_3
            - switch.turn_off: led_4
            - switch.turn_off: led_5
            - switch.turn_off: led_6
            - switch.turn_off: led_7
            - switch.turn_off: led_8
            - delay: 150ms
      - script.stop: cleaning_timeout_script
      - switch.turn_off: led_1
      - switch.turn_off: led_2
      - switch.turn_off: led_3
      - switch.turn_off: led_4
      - switch.turn_off: led_5
      - switch.turn_off: led_6
      - switch.turn_off: led_7
      - switch.turn_off: led_8

# ====== BUTTONS (active LOW, external pull-up resistors) ======
binary_sensor:
  - !include {
      file: blink-button-cleaning.yaml,
      vars: { n: 1, gpio: GPIO34, cleaning_partner: 8 },
    }
  - !include { file: blink-button.yaml, vars: { n: 2, gpio: GPIO32 } }
  - !include { file: blink-button.yaml, vars: { n: 3, gpio: GPIO25 } }
  - !include { file: blink-button.yaml, vars: { n: 4, gpio: GPIO27 } }
  - !include { file: blink-button.yaml, vars: { n: 5, gpio: GPIO35 } }
  - !include { file: blink-button.yaml, vars: { n: 6, gpio: GPIO33 } }
  - !include { file: blink-button.yaml, vars: { n: 7, gpio: GPIO26 } }
  - !include { file: blink-button.yaml, vars: { n: 8, gpio: GPIO14 } }

wifi:
  ssid: "WACHITOS_2G"
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Tester"

  manual_ip:
    static_ip: 192.168.1.188
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 8.8.8.8
