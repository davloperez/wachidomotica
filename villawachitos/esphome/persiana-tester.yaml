# Persiana Tester Configuration
# Imports shared logic from persiana-base.yaml

esphome:
  name: persiana-tester

packages:
  common: !include common.yaml

# ====== GLOBALS: blink state for all LED-buttons ======
globals:
  - !include { file: led-blink-global.yaml, vars: { n: 1 } }
  - !include { file: led-blink-global.yaml, vars: { n: 2 } }
  - !include { file: led-blink-global.yaml, vars: { n: 3 } }
  - !include { file: led-blink-global.yaml, vars: { n: 4 } }
  - !include { file: led-blink-global.yaml, vars: { n: 5 } }
  - !include { file: led-blink-global.yaml, vars: { n: 6 } }
  - !include { file: led-blink-global.yaml, vars: { n: 7 } }
  - !include { file: led-blink-global.yaml, vars: { n: 8 } }

# ====== SN74HC595N (8 LEDs secuenciales) ======
# DS=GPIO18, SH_CP=GPIO19, ST_CP=GPIO21
sn74hc595:
  - id: sn74hc595_hub
    data_pin: GPIO18
    clock_pin: GPIO19
    latch_pin: GPIO21
    sr_count: 1

switch:
  - !include { file: led-switch.yaml, vars: { n: 1, sr_number: 0 } }
  - !include { file: led-switch.yaml, vars: { n: 2, sr_number: 1 } }
  - !include { file: led-switch.yaml, vars: { n: 3, sr_number: 2 } }
  - !include { file: led-switch.yaml, vars: { n: 4, sr_number: 3 } }
  - !include { file: led-switch.yaml, vars: { n: 5, sr_number: 4 } }
  - !include { file: led-switch.yaml, vars: { n: 6, sr_number: 5 } }
  - !include { file: led-switch.yaml, vars: { n: 7, sr_number: 6 } }
  - !include { file: led-switch.yaml, vars: { n: 8, sr_number: 7 } }

script:
  # Blink scripts for all LED-buttons (0.5 s period)
  - !include { file: blink-script.yaml, vars: { n: 1 } }
  - !include { file: blink-script.yaml, vars: { n: 2 } }
  - !include { file: blink-script.yaml, vars: { n: 3 } }
  - !include { file: blink-script.yaml, vars: { n: 4 } }
  - !include { file: blink-script.yaml, vars: { n: 5 } }
  - !include { file: blink-script.yaml, vars: { n: 6 } }
  - !include { file: blink-script.yaml, vars: { n: 7 } }
  - !include { file: blink-script.yaml, vars: { n: 8 } }

# ====== BUTTONS (active LOW, external pull-up resistors) ======
binary_sensor:
  - !include { file: blink-button.yaml, vars: { n: 1, gpio: GPIO34 } }
  - !include { file: blink-button.yaml, vars: { n: 2, gpio: GPIO32 } }
  - !include { file: blink-button.yaml, vars: { n: 3, gpio: GPIO25 } }
  - !include { file: blink-button.yaml, vars: { n: 4, gpio: GPIO27 } }
  - !include { file: blink-button.yaml, vars: { n: 5, gpio: GPIO35 } }
  - !include { file: blink-button.yaml, vars: { n: 6, gpio: GPIO33 } }
  - !include { file: blink-button.yaml, vars: { n: 7, gpio: GPIO26 } }
  - !include { file: blink-button.yaml, vars: { n: 8, gpio: GPIO14 } }

wifi:
  ssid: "WACHITOS_2G"
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Tester"

  manual_ip:
    static_ip: 192.168.1.188
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 8.8.8.8
