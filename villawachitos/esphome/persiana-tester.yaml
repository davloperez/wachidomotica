# Persiana Salon 2 Configuration
# Imports shared logic from persiana-base.yaml

esphome:
  name: persiana-tester
  on_boot:
    priority: -100
    then:
      - script.execute: led_sequence

packages:
  base: !include persiana-base.yaml

# ====== SN74HC595N (8 LEDs secuenciales) ======
# DS=GPIO18, SH_CP=GPIO19, ST_CP=GPIO21
sn74hc595:
  - id: sn74hc595_hub
    data_pin: GPIO18
    clock_pin: GPIO19
    latch_pin: GPIO21
    sr_count: 1

switch:
  - platform: gpio
    id: led_1
    name: "LED 1"
    pin:
      sn74hc595: sn74hc595_hub
      number: 0
      inverted: false
  - platform: gpio
    id: led_2
    name: "LED 2"
    pin:
      sn74hc595: sn74hc595_hub
      number: 1
      inverted: false
  - platform: gpio
    id: led_3
    name: "LED 3"
    pin:
      sn74hc595: sn74hc595_hub
      number: 2
      inverted: false
  - platform: gpio
    id: led_4
    name: "LED 4"
    pin:
      sn74hc595: sn74hc595_hub
      number: 3
      inverted: false
  - platform: gpio
    id: led_5
    name: "LED 5"
    pin:
      sn74hc595: sn74hc595_hub
      number: 4
      inverted: false
  - platform: gpio
    id: led_6
    name: "LED 6"
    pin:
      sn74hc595: sn74hc595_hub
      number: 5
      inverted: false
  - platform: gpio
    id: led_7
    name: "LED 7"
    pin:
      sn74hc595: sn74hc595_hub
      number: 6
      inverted: false
  - platform: gpio
    id: led_8
    name: "LED 8"
    pin:
      sn74hc595: sn74hc595_hub
      number: 7
      inverted: false

script:
  - id: led_sequence
    then:
      - while:
          condition:
            lambda: return true;
          then:
            - switch.turn_on: led_1
            - delay: 1s
            - switch.turn_off: led_1
            - switch.turn_on: led_2
            - delay: 1s
            - switch.turn_off: led_2
            - switch.turn_on: led_3
            - delay: 1s
            - switch.turn_off: led_3
            - switch.turn_on: led_4
            - delay: 1s
            - switch.turn_off: led_4
            - switch.turn_on: led_5
            - delay: 1s
            - switch.turn_off: led_5
            - switch.turn_on: led_6
            - delay: 1s
            - switch.turn_off: led_6
            - switch.turn_on: led_7
            - delay: 1s
            - switch.turn_off: led_7
            - switch.turn_on: led_8
            - delay: 1s
            - switch.turn_off: led_8
            - delay: 3s

wifi:
  ssid: "WACHITOS_2G"
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Tester"

  manual_ip:
    static_ip: 192.168.1.188
    gateway: 192.168.1.1
    subnet: 255.255.255.0
    dns1: 192.168.1.1
    dns2: 8.8.8.8
