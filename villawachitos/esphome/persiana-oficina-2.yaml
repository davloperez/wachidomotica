# @esphome-device
# Persiana Oficina 2 Configuration

substitutions:
  device_id: "1"

esphome:
  name: persiana-oficina-2

packages:
  ips: !include ips.yaml
  base: !include persiana-base.yaml
  oficina_base: !include persiana-oficina-base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Oficina-2"

  manual_ip:
    static_ip: ${ip_persiana_oficina_2}
    gateway: 192.168.2.1
    subnet: 255.255.255.0
    dns1: 192.168.2.1
    dns2: 8.8.8.8
