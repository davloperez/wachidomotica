# @esphome-device
# Persiana Dormitorio 1 Configuration
# Imports shared logic from persiana-base-old.yaml

substitutions:
  device_id: "2"
  open_duration: "27" # Tiempo para subir (segundos)
  close_duration: "26" # Tiempo para bajar (segundos)

esphome:
  name: persiana-dormitorio-1

packages:
  base: !include persiana-base.yaml
  dormitorio_base: !include persiana-dormitorio-base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Dormitorio-1"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO27
      mode:
        input: true
        pulldown: true
    id: button_5
    name: "Button 5"
    on_press:
      - switch.toggle: relay_light_techo_vestidor

switch:
  - platform: gpio
    pin: GPIO21
    id: relay_light_techo_vestidor
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Techo Vestidor"
