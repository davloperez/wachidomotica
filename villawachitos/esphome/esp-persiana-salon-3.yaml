# @esphome-device
# Persiana Salon 3 Configuration
# Imports shared logic from persiana-base-old.yaml

substitutions:
  device_id: "7"
  open_duration: "23" # Tiempo para subir (segundos)
  close_duration: "22" # Tiempo para bajar (segundos)

esphome:
  name: persiana-salon-3

packages:
  base: !include persiana-base.yaml

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  output_power: 20.0dB

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    password: "platano+1234"
    ssid: "AP-Persiana-Salon-3"

switch:
  - platform: gpio
    pin: GPIO32
    id: relay_luz_techo_salon
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Techo Salón"

  - platform: gpio
    pin: GPIO25
    id: relay_luz_pasillo_salon
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Pasillo Salón"

  - platform: gpio
    pin: GPIO27
    id: relay_luz_aplique_pasillo_salon
    restore_mode: ALWAYS_OFF
    inverted: True
    name: "Luz Aplique Pasillo Salón"

cover:
  - id: !extend persiana_cover
    on_idle:
      - lambda: |-
          ESP_LOGI("persiana", "idle pos=%.2f op=%d",
            id(persiana_cover).position,
            id(persiana_cover).current_operation);
          id(persiana_position_storage) = id(persiana_cover).position;
          ESP_LOGI("persiana", "store idle pos=%.2f", id(persiana_position_storage));

# No blink scripts: LEDs reflect physical button state (on while pressed)

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO33
      mode:
        input: true
        pulldown: true
    id: boton_1_jung_arriba
    name: "Botón 1 jung arriba"
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: toggle_button_up
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 50ms
        then:
          - script.execute: set_button_up_60

  - platform: gpio
    pin:
      number: GPIO26
      mode:
        input: true
        pulldown: true
    id: boton_3_jung_arriba
    name: "Botón 3 jung arriba"
    on_multi_click:
      - timing:
          - ON for 50ms to 350ms
          - OFF for at least 350ms
        then:
          - script.execute: toggle_button_down
      - timing:
          - ON for 50ms to 350ms
          - OFF for 50ms to 350ms
          - ON for 50ms to 350ms
          - OFF for at least 50ms
        then:
          - script.execute: set_button_down_30

  - platform: gpio
    pin:
      number: GPIO15
      mode:
        input: true
        pulldown: true
    id: boton_1_jung_pasillo_salon
    name: "Botón 1 jung pasillo salón"
    on_press:
      - switch.toggle: relay_luz_aplique_pasillo_salon

  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: true
        pulldown: true
    id: boton_3_jung_pasillo_salon
    name: "Botón 3 jung pasillo salón"
    on_press:
      - switch.toggle: relay_luz_pasillo_salon

  - platform: gpio
    pin:
      number: GPIO19
      mode:
        input: true
        pulldown: true
    id: boton_5_jung_pasillo_salon
    name: "Botón 5 jung pasillo salón"
    on_press:
      - switch.toggle: relay_luz_techo_salon

  - platform: gpio
    pin:
      number: GPIO21
      mode:
        input: true
        pulldown: true
    id: boton_8_jung_entrada
    name: "Botón 8 jung entrada"
